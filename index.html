<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Plenária Final | 11ª CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Georama:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #08213D; color: white; font-family: 'Georama', sans-serif; overflow: hidden; }
        .drawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .drawer.open { transform: translateY(0); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <header class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20">
        <div class="flex items-center gap-4">
            <span class="bg-[#F5C400] text-[#0D2E5A] font-black px-4 py-2 rounded uppercase text-sm">Plenária Deliberativa</span>
            <span id="progress" class="text-white/50 font-bold uppercase text-xs tracking-widest">Sincronizando...</span>
        </div>
        <div class="flex gap-3">
            <button onclick="desfazer()" id="btn-undo" class="hidden bg-white/10 hover:bg-red-500/20 px-4 py-2 rounded text-xs font-bold uppercase border border-white/10"><i class="ph ph-arrow-u-up-left"></i> Desfazer</button>
            <button onclick="carregarFila()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded text-xs font-bold uppercase border border-white/10"><i class="ph ph-arrows-clockwise"></i> Atualizar</button>
        </div>
    </header>

    <main id="display" class="flex-1 flex flex-col justify-center items-center p-12 text-center">
        <div id="loader" class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-[#F5C400] border-t-transparent rounded-full animate-spin"></div>
            <p class="font-bold uppercase text-xs tracking-widest">Carregando Propostas...</p>
        </div>

        <div id="content" class="hidden max-w-6xl w-full fade-in">
            <div class="flex justify-center gap-2 mb-6">
                <span id="p-id" class="bg-white/10 px-3 py-1 rounded font-mono text-sm border border-white/10">ID</span>
                <span id="p-eixo" class="bg-[#1B6CB5] px-3 py-1 rounded font-black text-sm uppercase">Eixo</span>
            </div>
            <h2 id="p-titulo" class="text-4xl md:text-6xl font-black mb-8 leading-tight tracking-tight">--</h2>
            <div class="bg-white/5 border border-white/10 p-10 rounded-3xl backdrop-blur-md shadow-2xl relative">
                <p id="p-texto" class="text-2xl md:text-3xl font-medium leading-relaxed text-left whitespace-pre-wrap">--</p>
            </div>
        </div>
    </main>

    <footer id="controls" class="hidden p-6 bg-black/40 backdrop-blur-xl border-t border-white/10 flex flex-wrap justify-center gap-4">
        <button onclick="votar('Rejeitada', 'N/A')" class="bg-[#DC2626] hover:bg-red-700 px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg tracking-widest"><i class="ph ph-x-circle text-xl"></i> Rejeitar</button>
        <button onclick="abrirEditor('ajuste')" class="bg-[#1B6CB5] hover:bg-blue-600 px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg tracking-widest"><i class="ph ph-pencil-simple text-xl"></i> Modificar</button>
        <button onclick="abrirEditor('aglutinar')" class="bg-[#F5C400] text-[#0D2E5A] hover:bg-yellow-500 px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg tracking-widest"><i class="ph ph-git-merge text-xl"></i> Aglutinar</button>
        
        <div class="h-10 w-px bg-white/20 mx-2"></div>

        <button onclick="votar('Aprovada', 'Municipal')" class="bg-[#1E8A4A] hover:bg-green-700 px-6 py-4 rounded-xl font-black uppercase text-xs shadow-lg"><i class="ph ph-buildings"></i> Mun</button>
        <button onclick="votar('Aprovada', 'Estadual')" class="bg-[#0D2E5A] hover:bg-blue-900 px-6 py-4 rounded-xl font-black uppercase text-xs shadow-lg border border-white/20"><i class="ph ph-map-trifold"></i> Est</button>
        <button onclick="votar('Aprovada', 'Nacional')" class="bg-purple-800 hover:bg-purple-900 px-6 py-4 rounded-xl font-black uppercase text-xs shadow-lg"><i class="ph ph-flag"></i> Nac</button>
    </footer>

    <div id="drawer" class="drawer fixed bottom-0 left-0 w-full h-[80vh] bg-white text-[#2C3E50] rounded-t-[40px] shadow-2xl z-50 flex flex-col p-8 border-t-8 border-[#F5C400]">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-black uppercase tracking-tighter text-[#0D2E5A]">Redação de Plenária</h3>
            <button onclick="fecharEditor()" class="text-gray-400 hover:text-black"><i class="ph ph-x text-3xl"></i></button>
        </div>
        
        <div class="flex-1 flex gap-6 overflow-hidden">
            <div id="aglutinar-list" class="hidden w-1/3 border-r pr-4 overflow-y-auto space-y-2">
                <p class="text-[10px] font-black uppercase text-gray-400 mb-2">Selecionar para aglutinar:</p>
                </div>
            <div class="flex-1 flex flex-col gap-4">
                <div class="flex gap-4">
                    <select id="ed-nivel" class="flex-1 p-3 bg-gray-100 rounded-xl font-bold outline-none">
                        <option value="Municipal">Municipal</option><option value="Estadual">Estadual</option><option value="Nacional">Nacional</option>
                    </select>
                    <select id="ed-decisao" class="flex-1 p-3 bg-gray-100 rounded-xl font-bold outline-none">
                        <option value="Aprovada com Ajustes">Com Ajustes</option><option value="Aglutinada">Aglutinada</option>
                    </select>
                </div>
                <textarea id="ed-texto" class="flex-1 p-6 bg-gray-50 border-2 border-dashed rounded-2xl text-xl font-medium outline-none focus:border-[#F5C400] resize-none"></textarea>
                <button onclick="confirmarEdicao()" class="w-full bg-[#0D2E5A] text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Gravar Voto Final</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'COLE_AQUI_O_SEU_NOVO_URL_DE_IMPLANTAÇÃO';
        let fila = [];
        let index = 0;
        let selecionados = [];

        async function carregarFila() {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('content').classList.add('hidden');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                fila = data.fila;
                if(fila.length > 0) {
                    render();
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    document.getElementById('controls').classList.remove('hidden');
                } else {
                    document.getElementById('display').innerHTML = "<h1 class='text-4xl font-black uppercase text-[#F5C400]'>Plenária Finalizada!</h1>";
                }
            } catch(e) { alert("Erro de rede ao sincronizar."); }
        }

        function render() {
            const p = fila[index];
            selecionados = [p];
            document.getElementById('p-id').innerText = p.id;
            document.getElementById('p-eixo').innerText = p.eixo.split(':')[0];
            document.getElementById('p-titulo').innerText = p.titulo;
            document.getElementById('p-texto').innerText = p.texto;
            document.getElementById('progress').innerText = `Proposta ${index + 1} de ${fila.length}`;
        }

        function abrirEditor(modo) {
            document.getElementById('ed-texto').value = document.getElementById('p-texto').innerText;
            document.getElementById('drawer').classList.add('open');
            document.getElementById('ed-texto').oninput = (e) => { document.getElementById('p-texto').innerText = e.target.value; };
            
            const list = document.getElementById('aglutinar-list');
            if(modo === 'aglutinar') {
                list.classList.remove('hidden');
                list.innerHTML = fila.slice(index+1, index+10).map(p => `
                    <div onclick="addAglutinar('${p.id}')" class="p-3 bg-gray-50 border rounded-lg cursor-pointer hover:bg-yellow-50 text-xs font-bold">
                        <span class="text-[10px] text-blue-800">${p.id}</span><br>${p.titulo}
                    </div>
                `).join('');
            } else { list.classList.add('hidden'); }
        }

        function addAglutinar(id) {
            const p = fila.find(x => x.id === id);
            if(!selecionados.includes(p)) {
                selecionados.push(p);
                document.getElementById('ed-texto').value += `\n\n[+ ${p.id}]: ${p.texto}`;
                document.getElementById('p-texto').innerText = document.getElementById('ed-texto').value;
            }
        }

        async function votar(decisao, nivel) {
            const p = fila[index];
            const payload = {
                action: 'votar',
                proposta: {
                    linhas_origem: selecionados.map(x => x.linha),
                    ids_origem: selecionados.map(x => x.id).join(', '),
                    eixo: p.eixo, tema: p.tema, titulo: p.titulo,
                    texto: document.getElementById('p-texto').innerText,
                    decisao: decisao, nivel: nivel
                }
            };
            
            document.getElementById('display').classList.add('opacity-30');
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            document.getElementById('display').classList.remove('opacity-30');
            fecharEditor();
            index++;
            if(index < fila.length) render(); else carregarFila();
        }

        function confirmarEdicao() {
            votar(document.getElementById('ed-decisao').value, document.getElementById('ed-nivel').value);
        }

        function fecharEditor() { document.getElementById('drawer').classList.remove('open'); }
        carregarFila();
    </script>
</body>
</html>
