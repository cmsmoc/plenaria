<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Plenária Final | 11ª CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #08213D; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .drawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .drawer.open { transform: translateY(0); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); } ::-webkit-scrollbar-thumb { background: #1A5EA8; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <header class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20">
        <div class="flex items-center gap-4">
            <span class="bg-[#F5C400] text-[#0D2E5A] font-black px-4 py-2 rounded uppercase text-sm">Plenária Deliberativa</span>
            <span id="progress" class="text-white/50 font-bold uppercase text-xs tracking-widest">Sincronizando...</span>
        </div>
        <div class="flex gap-3">
            <button onclick="desfazer()" id="btn-undo" class="hidden bg-red-600/20 hover:bg-red-600 text-white px-4 py-2 rounded text-xs font-bold uppercase border border-red-500/50 transition-all flex items-center gap-2">
                <i class="ph ph-arrow-u-up-left"></i> Desfazer Última Ação
            </button>
            <button onclick="carregarFila()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded text-xs font-bold uppercase border border-white/10"><i class="ph ph-arrows-clockwise"></i> Atualizar</button>
        </div>
    </header>

    <main id="display" class="flex-1 flex flex-col justify-center items-center p-12 text-center">
        <div id="loader" class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-[#F5C400] border-t-transparent rounded-full animate-spin"></div>
            <p class="font-bold uppercase text-xs tracking-widest text-white/50">Carregando Fila de Votação...</p>
        </div>

        <div id="content" class="hidden max-w-6xl w-full fade-in">
            <div class="flex justify-center gap-2 mb-6">
                <span id="p-id" class="bg-white/10 px-3 py-1 rounded font-mono text-sm border border-white/10">ID</span>
                <span id="p-eixo" class="bg-[#1B6CB5] px-4 py-1 rounded font-black text-sm uppercase shadow-lg">Eixo</span>
            </div>
            <h2 id="p-titulo" class="text-4xl md:text-6xl font-black mb-8 leading-tight tracking-tight drop-shadow-xl text-white">--</h2>
            <div class="bg-white/5 border border-white/10 p-10 rounded-3xl backdrop-blur-md shadow-2xl relative">
                <p id="p-texto" class="text-2xl md:text-[32px] font-medium leading-relaxed text-left whitespace-pre-wrap text-white/90">--</p>
            </div>
        </div>
    </main>

    <footer id="controls" class="hidden p-6 bg-black/60 backdrop-blur-xl border-t border-white/10 flex flex-wrap justify-center gap-4 relative z-20">
        <button onclick="votar('Rejeitada', 'N/A')" class="bg-[#DC2626] hover:bg-red-700 px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg tracking-widest transition-transform hover:-translate-y-1"><i class="ph ph-x-circle text-xl"></i> Rejeitar</button>
        <button onclick="abrirEditor('ajuste')" class="bg-[#1B6CB5] hover:bg-blue-600 px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg tracking-widest transition-transform hover:-translate-y-1"><i class="ph ph-pencil-simple text-xl"></i> Modificar</button>
        <button onclick="abrirEditor('aglutinar')" class="bg-[#F5C400] text-[#0D2E5A] hover:bg-yellow-500 px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg tracking-widest transition-transform hover:-translate-y-1"><i class="ph ph-git-merge text-xl"></i> Aglutinar</button>
        
        <div class="h-10 w-px bg-white/20 mx-2"></div>

        <button onclick="votar('Aprovada', 'Municipal')" class="bg-[#1E8A4A] hover:bg-green-700 px-6 py-4 rounded-xl font-black uppercase text-xs shadow-lg transition-transform hover:-translate-y-1"><i class="ph ph-buildings"></i> Mun</button>
        <button onclick="votar('Aprovada', 'Estadual')" class="bg-[#0D2E5A] hover:bg-[#0D3D6B] px-6 py-4 rounded-xl font-black uppercase text-xs shadow-lg border border-white/20 transition-transform hover:-translate-y-1"><i class="ph ph-map-trifold"></i> Est</button>
        <button onclick="votar('Aprovada', 'Nacional')" class="bg-purple-800 hover:bg-purple-900 px-6 py-4 rounded-xl font-black uppercase text-xs shadow-lg transition-transform hover:-translate-y-1"><i class="ph ph-flag"></i> Nac</button>
    </footer>

    <div id="drawer" class="drawer fixed bottom-0 left-0 w-full h-[85vh] bg-white text-[#2C3E50] rounded-t-[40px] shadow-[0_-20px_60px_rgba(0,0,0,0.5)] z-50 flex flex-col p-8 border-t-8 border-[#F5C400]">
        <div class="flex justify-between items-center mb-6 shrink-0">
            <div class="flex items-center gap-3">
                <i class="ph-fill ph-pencil-circle text-4xl text-[#F5C400]"></i>
                <h3 class="text-2xl font-black uppercase tracking-tighter text-[#0D2E5A]" id="drawer-title">Ajuste de Plenária</h3>
            </div>
            <button onclick="fecharEditor()" class="text-gray-400 hover:text-black transition-colors"><i class="ph ph-x text-4xl"></i></button>
        </div>
        
        <div class="flex-1 flex gap-8 overflow-hidden">
            <div id="aglutinar-panel" class="hidden w-[350px] border-r pr-6 flex flex-col">
                <label class="text-[10px] font-black uppercase text-gray-400 mb-2 tracking-widest">Aglutinar com:</label>
                <input type="text" id="search-aglutinar" placeholder="Pesquisar proposta..." class="w-full p-2 mb-4 bg-gray-100 rounded-lg text-sm border-none outline-none focus:ring-2 focus:ring-[#F5C400]">
                <div id="lista-aglutinar" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </div>

            <div class="flex-1 flex flex-col gap-4">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 mb-1 block">Nível de Execução</label>
                        <select id="ed-nivel" class="w-full p-4 bg-gray-100 rounded-xl font-bold text-[#0D2E5A] outline-none">
                            <option value="Municipal">Municipal</option>
                            <option value="Estadual">Estadual</option>
                            <option value="Nacional">Nacional</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-black uppercase text-gray-400 mb-1 block">Decisão Final</label>
                        <select id="ed-decisao" class="w-full p-4 bg-gray-100 rounded-xl font-bold text-[#0D2E5A] outline-none">
                            <option value="Aprovada com Ajustes">Aprovada com Ajustes</option>
                            <option value="Aglutinada na Plenária">Aglutinada na Plenária</option>
                            <option value="Rejeitada Parcialmente">Rejeitada Parcialmente</option>
                        </select>
                    </div>
                </div>
                <div class="flex-1 flex flex-col relative">
                    <textarea id="ed-texto" class="w-full flex-1 p-8 bg-[#FEF8E7] border-2 border-dashed border-[#F5C400]/40 rounded-3xl text-2xl font-medium leading-relaxed outline-none focus:border-[#F5C800] resize-none shadow-inner text-gray-800"></textarea>
                    <div class="absolute bottom-4 right-6 text-[10px] font-black uppercase text-[#F5C400] pointer-events-none animate-pulse">Editando ao vivo no telão</div>
                </div>
                <button onclick="confirmarEdicao()" class="w-full bg-[#0D2E5A] hover:bg-[#0D3D6B] text-white py-6 rounded-2xl font-black uppercase tracking-widest shadow-xl text-lg transition-all">Confirmar e Gravar Voto</button>
            </div>
        </div>
    </div>

    <div id="saving-overlay" class="fixed inset-0 bg-[#08213D]/95 z-[100] hidden items-center justify-center backdrop-blur-md">
        <div class="text-center">
            <i class="ph-bold ph-check-circle animate-pulse text-9xl text-green-500 mb-6"></i>
            <h2 class="text-3xl font-black text-white uppercase tracking-widest">Voto Gravado com Sucesso!</h2>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwEIpxZVXeEDqbGriqHEJzv-HmZfq8nETMAD4xcHs3Lpb6GM_sHSoW5_Mc0kSTJ2arYPw/exec';
        let fila = [];
        let index = 0;
        let selecionados = [];

        async function carregarFila() {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('content').classList.add('hidden');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                fila = data.fila;
                if(fila.length > 0) {
                    render();
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    document.getElementById('controls').classList.remove('hidden');
                } else {
                    document.getElementById('display').innerHTML = "<div class='text-center'><i class='ph-fill ph-check-circle text-8xl text-green-500 mb-4'></i><h1 class='text-4xl font-black uppercase text-[#F5C400]'>Plenária Finalizada!</h1></div>";
                }
            } catch(e) { alert("Erro ao sincronizar com a nuvem."); }
        }

        function render() {
            if (index >= fila.length) { carregarFila(); return; }
            const p = fila[index];
            selecionados = [p];
            document.getElementById('p-id').innerText = p.id;
            document.getElementById('p-eixo').innerText = p.eixo.split(':')[0];
            document.getElementById('p-titulo').innerText = p.titulo;
            document.getElementById('p-texto').innerText = p.texto;
            document.getElementById('progress').innerText = `Proposta ${index + 1} de ${fila.length}`;
            
            const content = document.getElementById('content');
            content.classList.remove('fade-in');
            void content.offsetWidth;
            content.classList.add('fade-in');
        }

        function abrirEditor(modo) {
            const inputEdit = document.getElementById('ed-texto');
            inputEdit.value = document.getElementById('p-texto').innerText;
            document.getElementById('drawer').classList.add('open');
            
            // Espelhamento ao vivo
            inputEdit.oninput = (e) => { document.getElementById('p-texto').innerText = e.target.value; };
            
            const panel = document.getElementById('aglutinar-panel');
            if(modo === 'aglutinar') {
                document.getElementById('drawer-title').innerText = "Aglutinação de Plenária";
                panel.classList.remove('hidden');
                renderListaAglutinar();
            } else {
                document.getElementById('drawer-title').innerText = "Ajuste de Texto";
                panel.classList.add('hidden');
            }
        }

        function renderListaAglutinar() {
            const list = document.getElementById('lista-aglutinar');
            const q = document.getElementById('search-aglutinar').value.toLowerCase();
            list.innerHTML = fila.slice(index + 1).filter(p => p.texto.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)).map(p => `
                <div onclick="addAglutinar('${p.id}')" class="p-3 bg-gray-50 border rounded-xl cursor-pointer hover:bg-blue-50 transition-colors">
                    <span class="text-[10px] font-black text-blue-700">${p.id}</span>
                    <p class="text-[11px] font-medium text-gray-600 line-clamp-2">${p.texto}</p>
                </div>
            `).join('');
        }

        function addAglutinar(id) {
            const p = fila.find(x => x.id === id);
            if(!selecionados.includes(p)) {
                selecionados.push(p);
                const area = document.getElementById('ed-texto');
                area.value += `\n\n[+ ${p.id}]: ${p.texto}`;
                document.getElementById('p-texto').innerText = area.value;
            }
        }

        document.getElementById('search-aglutinar').oninput = renderListaAglutinar;

        async function votar(decisao, nivel) {
            document.getElementById('saving-overlay').classList.remove('hidden');
            document.getElementById('saving-overlay').classList.add('flex');
            
            const p = fila[index];
            const payload = {
                action: 'votar',
                proposta: {
                    linhas_origem: selecionados.map(x => x.linha),
                    ids_origem: selecionados.map(x => x.id).join(', '),
                    eixo: p.eixo, tema: p.tema, titulo: p.titulo,
                    texto: document.getElementById('p-texto').innerText,
                    decisao: decisao, nivel: nivel
                }
            };
            
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                document.getElementById('btn-undo').classList.remove('hidden');
                fecharEditor();
                index++;
                render();
            } finally {
                setTimeout(() => {
                    document.getElementById('saving-overlay').classList.add('hidden');
                }, 800);
            }
        }

        async function desfazer() {
            if(!confirm("Deseja anular o último voto e devolvê-lo à fila?")) return;
            document.getElementById('loader').classList.remove('hidden');
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'desfazer' }) });
            document.getElementById('btn-undo').classList.add('hidden');
            await carregarFila();
        }

        function confirmarEdicao() {
            votar(document.getElementById('ed-decisao').value, document.getElementById('ed-nivel').value);
        }

        function fecharEditor() { document.getElementById('drawer').classList.remove('open'); document.getElementById('p-texto').innerText = fila[index].texto; }
        
        carregarFila();
    </script>
</body>
</html>
